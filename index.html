<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Generador de contraseñas seguras y aleatorias. Personaliza la longitud, incluye mayúsculas, minúsculas, números y caracteres especiales." />

    <link rel="icon" type="image/svg+xml" href="assets/img/password-favicon.svg" />
    <title> Generador de Contraseñas Seguras </title>

    <link rel="stylesheet" href="assets/css/styles.css" />

</head>

<body>

    <!--  -----  Contenedor principal de la aplicación  -----  -->
    <main class="app" role="main">

        <!--  -----  Encabezado de la aplicación  -----  -->
        <header class="app__header">

            <div class="app__header-icon" aria-hidden="true">

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>

            </div>

            <h1 class="app__title"> Generador de Contraseñas </h1>
            <p class="app__subtitle"> Crea contraseñas seguras y personalizadas </p>

        </header>


        <!--  -----  Tarjeta principal de la aplicación  -----  -->
        <section class="app__card">

            <!--  -----  Resultado de la contraseña  -----  -->
            <div class="password-output" id="password-output-section">

                <!--  -----  Campo de la contraseña  -----  -->
                <div class="password-output__field">

                    <!--  -----  Input de la contraseña  -----  -->
                    <input type="password" class="password-output__text" id="password-display" aria-live="polite"
                        aria-label="Contraseña generada" placeholder="Tu contraseña aparecerá aquí..." readonly />

                    <!--  -----  Botón de mostrar/ocultar contraseña  -----  -->
                    <button class="password-output__toggle" id="btn-toggle-visibility" type="button"
                        aria-label="Mostrar u ocultar contraseña" title="Mostrar / Ocultar contraseña">

                        <!--  -----  Ícono ojo abierto  -----  -->
                        <svg class="icon icon--eye-open" id="icon-eye-open" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>

                        <!--  -----  Ícono ojo cerrado  -----  -->
                        <svg class="icon icon--eye-closed" id="icon-eye-closed" xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="17.94" y1="17.94" x2="22" y2="22"></line>
                            <line x1="1" y1="1" x2="6.06" y2="6.06"></line>
                            <path
                                d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                            </path>
                            <path d="M1 1l22 22"></path>
                        </svg>

                    </button>

                </div>

                <!--  -----  Botón de copiar  -----  -->
                <button class="password-output__copy" id="btn-copy" type="button"
                    aria-label="Copiar contraseña al portapapeles" title="Copiar al portapapeles" disabled>

                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>

                    <span id="copy-btn-text">Copiar</span>

                </button>

            </div>


            <!--  -----  Indicador de fortaleza  -----  -->
            <div class="strength" id="strength-section" aria-label="Indicador de fortaleza de contraseña">

                <!--  -----  Barras de fortaleza  -----  -->
                <div class="strength__bars" id="strength-bars" role="progressbar" aria-valuenow="0" aria-valuemin="0"
                    aria-valuemax="4">
                    <span class="strength__bar" id="strength-bar-1"></span>
                    <span class="strength__bar" id="strength-bar-2"></span>
                    <span class="strength__bar" id="strength-bar-3"></span>
                    <span class="strength__bar" id="strength-bar-4"></span>
                </div>

                <!--  -----  Etiqueta de fortaleza  -----  -->
                <p class="strength__label" id="strength-label"> Sin contraseña </p>
            </div>


            <!--  -----  Configuración  -----  -->
            <form class="config" id="config-form" novalidate>

                <!--  -----  Longitud  -----  -->
                <div class="config__group config__group--length">

                    <!--  -----  Etiqueta de longitud  -----  -->
                    <label class="config__label" for="input-length">
                        Longitud
                        <span class="config__length-value" id="length-value">12</span>
                    </label>

                    <!--  -----  Input de longitud  -----  -->
                    <input class="config__range" id="input-length" type="range" min="4" max="64" value="12"
                        aria-label="Longitud de la contraseña" aria-valuemin="4" aria-valuemax="64"
                        aria-valuenow="12" />

                    <!--  -----  Límites de longitud  -----  -->
                    <div class="config__range-limits">
                        <span>4</span>
                        <span>64</span>
                    </div>

                </div>


                <!--  -----  Opciones de caracteres  -----  -->
                <fieldset class="config__group config__group--options">

                    <!--  -----  Leyenda de opciones  -----  -->
                    <legend class="config__legend"> Incluir caracteres </legend>

                    <!--  -----  Opción de mayúsculas  -----  -->
                    <label class="config__option" for="check-uppercase">
                        <input class="config__checkbox" id="check-uppercase" type="checkbox" checked />
                        <span class="config__checkbox-custom" aria-hidden="true"></span>
                        <span class="config__option-text">
                            <strong>Mayúsculas</strong>
                            <small>A – Z</small>
                        </span>
                    </label>

                    <label class="config__option" for="check-lowercase">
                        <input class="config__checkbox" id="check-lowercase" type="checkbox" checked />
                        <span class="config__checkbox-custom" aria-hidden="true"></span>
                        <span class="config__option-text">
                            <strong>Minúsculas</strong>
                            <small>a – z</small>
                        </span>
                    </label>

                    <!--  -----  Opción de números  -----  -->
                    <label class="config__option" for="check-numbers">
                        <input class="config__checkbox" id="check-numbers" type="checkbox" checked />
                        <span class="config__checkbox-custom" aria-hidden="true"></span>
                        <span class="config__option-text">
                            <strong>Números</strong>
                            <small>0 – 9</small>
                        </span>
                    </label>

                    <!--  -----  Opción de símbolos  -----  -->
                    <label class="config__option" for="check-symbols">
                        <input class="config__checkbox" id="check-symbols" type="checkbox" />
                        <span class="config__checkbox-custom" aria-hidden="true"></span>
                        <span class="config__option-text">
                            <strong>Símbolos</strong>
                            <small>!@#$%^&amp;*</small>
                        </span>
                    </label>

                </fieldset>

                <!--     -----  Mensaje de error de validación  -----  -->
                <p class="config__error" id="config-error" role="alert" aria-live="assertive"></p>

                <!--  -----  Botón generar  -----  -->
                <button class="config__btn-generate" id="btn-generate" type="submit">

                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Generar Contraseña

                </button>

            </form>

        </section>


        <!--  -----  Pie de página  -----  -->
        <footer class="app__footer">

            <p>
                Generador de Contraseñas &copy;
                <span id="footer-year"></span>
            </p>

        </footer>

    </main>

    <script src="assets/js/app.js"></script>

</body>


</html>
